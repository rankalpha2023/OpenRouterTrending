name: Fetch OpenRouter Rankings Data

on:
  # Run daily at 00:00 UTC (8:00 AM Beijing time)
  schedule:
    - cron: '0 0 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      date:
        description: 'Date for data (YYYY-MM-DD, defaults to today)'
        required: false
        type: string

  # Also run on push to main branch
  push:
    branches:
      - main

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Fetch OpenRouter Top Apps data
        id: fetch_apps
        run: |
          # Determine date
          DATE=$(date +%Y-%m-%d)
          if [ -n "${{ inputs.date }}" ]; then
            DATE="${{ inputs.date }}"
          fi
          
          echo "Fetching Top Apps data for date: $DATE"
          
          # Fetch Top Apps (always day period as week/month are not available in HTML)
          python fetch_openrouter_data.py \
            --output-dir data \
            --date "$DATE" \
            --section apps \
            --period day

          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "::set-output name=date::$DATE"

      - name: Show fetched data files
        run: |
          echo "Data files created:"
          ls -la data/top_apps/ 2>/dev/null || echo "No data files found"

      - name: Commit and Push data
        run: |
          # Add data files (force to override .gitignore)
          git add -f data/top_apps/*.json
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            echo "Committing and pushing changes..."
            COMMIT_DATE=$(date +%Y-%m-%d)
            git commit -m "Update OpenRouter Top Apps - $COMMIT_DATE"
            git push origin HEAD:${{ github.ref }}
            echo "Push completed successfully"
          fi