name: Fetch OpenRouter Rankings Data

on:
  # Run daily at 00:00 UTC (8:00 AM Beijing time)
  schedule:
    - cron: '0 0 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      date:
        description: 'Date for data (YYYY-MM-DD, defaults to today)'
        required: false
        type: string
      section:
        description: 'Section to fetch'
        required: false
        type: choice
        default: 'all'
        options:
          - all
          - apps
          - models
      period:
        description: 'Time period'
        required: false
        type: choice
        default: 'week'
        options:
          - day
          - week
          - month

  # Also run on push to main branch
  push:
    branches:
      - main

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Fetch OpenRouter data
        id: fetch
        run: |
          # Determine date
          DATE=$(date +%Y-%m-%d)
          if [ -n "${{ inputs.date }}" ]; then
            DATE="${{ inputs.date }}"
          fi
          
          echo "Fetching data for date: $DATE"
          
          # Fetch all sections
          SECTION="${{ inputs.section || 'all' }}"
          PERIOD="${{ inputs.period || 'week' }}"
          
          python fetch_openrouter_data.py \
            --output-dir data \
            --date "$DATE" \
            --section "$SECTION" \
            --period "$PERIOD"
          
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Show fetched data files
        run: |
          echo "Data files created:"
          find data -name "*.json" -type f | sort

      - name: Commit data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update OpenRouter rankings data - ${{ steps.fetch.outputs.date }}"
          file_pattern: 'data/*.json data/**/*.json'
          skip_dirty: false

  # Also run weekly summary job
  fetch-weekly-data:
    runs-on: ubuntu-latest
    # Only run weekly on Mondays
    if: github.event_name == 'schedule' && github.event.schedule == '0 0 * * 1'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Fetch weekly data
        run: |
          # Fetch day, week, month data for comprehensive weekly snapshot
          python fetch_openrouter_data.py --output-dir data --period day
          python fetch_openrouter_data.py --output-dir data --period week
          python fetch_openrouter_data.py --output-dir data --period month

      - name: Show fetched data files
        run: |
          echo "Weekly data files created:"
          find data -name "*.json" -type f | sort

      - name: Commit weekly data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Weekly OpenRouter rankings snapshot"
          file_pattern: 'data/*.json data/**/*.json'
          skip_dirty: false