name: Fetch OpenRouter Rankings Data

on:
  # Run daily at 00:00 UTC (8:00 AM Beijing time)
  schedule:
    - cron: '0 0 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      date:
        description: 'Date for data (YYYY-MM-DD, defaults to today)'
        required: false
        type: string
      section:
        description: 'Section to fetch'
        required: false
        type: choice
        default: 'all'
        options:
          - all
          - apps
          - models

  # Also run on push to main branch
  push:
    branches:
      - main

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Fetch OpenRouter Top Apps data
        id: fetch_apps
        run: |
          # Determine date
          DATE=$(date +%Y-%m-%d)
          if [ -n "${{ inputs.date }}" ]; then
            DATE="${{ inputs.date }}"
          fi
          
          echo "Fetching Top Apps data for date: $DATE"
          
          # Fetch Top Apps (always day period as week/month are not available in HTML)
          python fetch_openrouter_data.py \
            --output-dir data \
            --date "$DATE" \
            --section apps \
            --period day

          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Show fetched data files
        run: |
          echo "Data files created:"
          ls -la data/top_apps/ 2>/dev/null || echo "No data files found"

      - name: Commit data
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.section != 'models'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update OpenRouter Top Apps - ${{ steps.fetch_apps.outputs.date }}"
          file_pattern: 'data/*.json data/**/*.json'
          skip_dirty: false